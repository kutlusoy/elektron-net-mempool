services:
  elektron-mempool-db:
    container_name: elektron-mempool-db
    image: mariadb:11
    restart: unless-stopped
    networks:
      - backend
    environment:
      MYSQL_DATABASE: "mempool"
      MYSQL_USER: "mempool"
      MYSQL_PASSWORD: "mempool"
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - ./data/mempool-db:/var/lib/mysql

  elektron-mempool-api:
    container_name: elektron-mempool-api
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - elektron-mempool-db
    networks:
      - backend
    environment:
      MEMPOOL_NETWORK: "mainnet"
      MEMPOOL_BACKEND: "none"
      CORE_RPC_HOST: "host.docker.internal"
      CORE_RPC_PORT: "8332"
      CORE_RPC_USERNAME: "elektron"
      CORE_RPC_PASSWORD: "elektron"
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "elektron-mempool-db"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: "mempool"
      DATABASE_PASSWORD: "mempool"
      STATISTICS_ENABLED: "true"
      FIAT_PRICE_ENABLED: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/mempool-cache:/backend/cache

  elektron-mempool-web:
    container_name: elektron-mempool-web
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - elektron-mempool-api
    networks:
      - backend
      - web
    environment:
      FRONTEND_HTTP_PORT: "8080"
      BACKEND_MAINNET_HTTP_HOST: "elektron-mempool-api"
      BACKEND_MAINNET_HTTP_PORT: "8999"
      MEMPOOL_WEBSITE_URL: "https://mempool.elektron-net.org"
      HISTORICAL_PRICE: "false"
      ACCELERATOR_BUTTON: "false"
      SERVICES_API: ""
    ports:
      - "8080:8080"

networks:
  backend:
    external: true
    name: backend
  web:
    external: true
    name: web
